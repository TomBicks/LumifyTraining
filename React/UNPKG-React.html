<!DOCTYPE html>
<html>
<head>
	<script src="https://unpkg.com/react@16.7.0/umd/react.development.js"></script>
	<script src="https://unpkg.com/react-dom@16.7.0/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/prop-types@15.6/prop-types.js"></script>
	<script src="https://unpkg.com/babel-standalone@6.26.0/babel.js"></script>
	<style>
		#my-react-app > div {
			border: 2px black solid;
		}
		
		.circle {
			border-radius: 50%;
			border: 10px skyblue;
			width: 200px;
			height: 200px;
			font-size: 20px;
			text-align: center;
			vertical-align: center;
		}
		
		.red {
			color: red;
		}
		
		.green {
			color: green;
		}
	</style>
</head>
<body>
	<div id="my-react-app">
		<div id="fruit-list"></div>
		<div id="react-component"></div>
		<div id="function-components"></div>
		
		<!-- Props & States -->
		<div id="react-prop1"></div>
		<div id="react-prop2"></div>
		<div id="nested-props"></div>
		</br>
		<div id="transfer-props"></div>
		<br>
		<div id="spread-props"></div>
		<br>
		<div id="react-dynamic-prop1"></div>
		<div id="react-dynamic-prop2"></div>
		<div id="react-dynamic-prop3"></div>
		<div id="react-dynamic-prop4"></div>
		<div id="react-dynamic-prop5"></div>
		<div id="react-dynamic-prop6"></div>
		<br>
		<div id="default-prop1"></div>
		<div id="default-prop2"></div>
		<br>
		<div id="validate-prop"></div>
		<br>
		<div class="container" id="outer1"></div>
		<div class="container" id="outer2"></div>
		<div class="container" id="outer3"></div>
		<br>
		<div id="expression-props"></div>
		<br>
		<div id="functions-as-children"></div>
		<br>
		<div id="react-state"></div>
		<br>
		<div id="react-update-state"></div>
		<br>
		<div id="react-previous-state"></div>
		<br>
		
		<!-- Events -->
		<div id="events"></div>
		<br>
		<div id="prevent-default"></div>
		<br>
		<div id="synthetic-events"></div>
		<br>
		<div id="toggle-state"></div>
		<br>
		<div id="lifecycle-mount-phase"></div>
		<br>
		<div id="lifecycle-unmount-phase"></div>
		<br>
		<div id="lifecycle-update-shoulder-component-update-phase"></div>
		<br>
		
		<!-- Working with Forms -->
		<div id="controlled-components"></div>
		<br>
		<div id="multiple-components"></div>
		<br>
		<div id="multiple-inputs"></div>
		<br>
		<div id="form-setup"></div>
		<br>
		<div id="form-validation"></div>
		<br>
		<div id="uncontrolled-components"></div>
		<br>
		<div id="file-inputs"></div>
	</div>
	
	<!-- Props & States -->
	<script type="text/babel" src="ReactComponent.js"></script>
	<script type="text/babel" src="FunctionComponents.js"></script>
	<script type="text/babel" src="Props.js"></script>
	<script type="text/babel" src="NestedProps.js"></script>
	<script type="text/babel" src="TransferringProps.js"></script>
	<script type="text/babel" src="SpreadOperator.js"></script>
	<script type="text/babel" src="DynamicTypesWithProps.js"></script>
	<script type="text/babel" src="DefaultProps.js"></script>
	<script type="text/babel" src="ValidatingProps.js"></script>
	<script type="text/babel" src="PropsChildren.js"></script>
	<script type="text/babel" src="ExpressionProps.js"></script>
	<script type="text/babel" src="FunctionsAsChildren.js"></script>
	<script type="text/babel" src="State.js"></script>
	<script type="text/babel" src="UpdateState.js"></script>
	<script type="text/babel" src="PreviousState.js"></script>
	
	<!-- Events -->
	<script type="text/babel" src="Events.js"></script>
	<script type="text/babel" src="PreventDefaultEvent.js"></script>
	<script type="text/babel" src="SyntheticEvents.js"></script>
	<script type="text/babel" src="ToggleState.js"></script>
	<script type="text/babel" src="LifecycleMountPhase.js"></script>
	<script type="text/babel" src="LifecycleUnmountPhase.js"></script>
	
	<!-- Working with Forms -->
	<script type="text/babel" src="ControlledComponents.js"></script>
	<script type="text/babel" src="MultipleComponents.js"></script>
	<script type="text/babel" src="MultipleInputs.js"></script>
	<script type="text/babel" src="FormSetup.js"></script>
	<script type="text/babel" src="FormValidation.js"></script>
	<script type="text/babel" src="UncontrolledComponents.js"></script>
	<script type="text/babel" src="FileInputs.js"></script>
</body>
</html>
