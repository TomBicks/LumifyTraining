<!doctype html> <!-- browser now expects the document to be html -->
<html>
	<head>
		<title>Testing Front-End</title> <!-- name of the document (shows in browser) -->
		<style>
			body {
				font-family: Verdana, sans-serif;
				text-align: center;
			}
			h4 {
				color: indigo;
				letter-spacing: 4px;
			}
		</style> <!-- define styles for the current document without need for CSS file -->
		<meta charset="utf-8"> <!-- details about the document, like keywords (such as UTF-8 character set) -->
		<script src="JSTest.js"> 
			<!-- add client-side scripts to control behaviour -->
			document.write("<p>HTML File has Loaded.</p>");
			console.log("HTML File has Loaded.");
		</script>
		<link rel="stylesheet" href="CSSTest.css"> <!-- mainly used to link to external style sheets -->
	</head>
	<body>
		<nav> <!-- defines a set of navigation links --> 
			<a href="otherPage.html">Other Page</a>
			<a href="yetAnotherPage.html">Yet Another Page</a>
		</nav>
	
		<h4>Send me an email!</h4>
		<form id="gridstyle"> <!-- collect data from user --> 
			<div> <input type="text" id="emailHeader"> </div>
			<div> <input type="text" id="emailBody"> </div>
			<div> <button style="color:red">Send</button> </div>
		</form>
		
		<div>
			<p>Enter a Number</p>
			<input id="num" type="text">
			</br>
			<button type="button" onclick="isEven()">Test Input</button>
		</div>
		
		</br>
		<form>
			<div id="futureCourses"></div>
			<button onclick="sendAlert(this)">sendAlert</button>
			<input type="text" required minlength="4" maxlength="6"> <!-- min of 4 max of 6 characters --> 
			<input type="text" pattern="[A-Za-z]{3}"> <!-- Accept only 3 instances of the filter; here, only 3 uppercase or lowercase letters --> 
			<input type="text" pattern="[A-Za-z]{1,}"> <!-- Makes sure the first character is a letter; after that it doesn't care (hence the empty max range ", ") --> 
			<input type="text" pattern="[A-Za-z]{1,}[+]{0,2}"> <!-- Makes sure the first character is a letter, then ensures either 0 to 2 '+' follow it; 3 would fail --> 
		</form>
	</body>
</html>
